<!DOCTYPE html>
<html>
<head>
<title>SaulGPT</title>
<style>
body{
font-family: Arial;
background:#f5f5f5;
padding:40px;
}

.container{
background:white;
padding:30px;
width:400px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
margin-top:10px;
padding:8px;
}

button{
margin-top:15px;
padding:10px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

#output{
margin-top:20px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>SaulGPT Legal Assistant</h1>

<div class="container">

<label>Case Type</label>
<input id="case_type">

<label>Incident</label>
<textarea id="incident"></textarea>

<label>Amount</label>
<input id="amount">

<button onclick="generate()">Generate Legal Draft</button>

<div id="output"></div>

</div>

<script>

async function generate(){

const case_type = document.getElementById("case_type").value
const incident = document.getElementById("incident").value
const amount = document.getElementById("amount").value

const response = await fetch("http://127.0.0.1:8000/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
case_type:case_type,
incident:incident,
amount:amount
})
})

const data = await response.json()

document.getElementById("output").innerText = data.response

}

</script>

</body>
</html>
